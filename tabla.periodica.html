<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabla Periódica Interactiva</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a; --surface: #111827; --border: #1e2d45;
    --text: #e2e8f0; --muted: #64748b; --accent: #00d4ff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Barlow Condensed',sans-serif; min-height:100vh; overflow-x:auto; padding:20px; }
  body::before { content:''; position:fixed; top:0;left:0;width:100%;height:100%; background:radial-gradient(ellipse at 20% 50%,rgba(0,212,255,.04) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(167,139,250,.04) 0%,transparent 60%); pointer-events:none; z-index:0; }
  .wrapper { position:relative; z-index:1; min-width:900px; }
  header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--border); gap:16px; flex-wrap:wrap; }
  h1 { font-family:'Space Mono',monospace; font-size:clamp(14px,2vw,20px); color:var(--accent); letter-spacing:.1em; text-transform:uppercase; }
  .subtitle { font-size:12px; color:var(--muted); letter-spacing:.2em; text-transform:uppercase; margin-top:2px; }
  .info-panel { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 18px; min-width:200px; text-align:center; }
  .info-panel .symbol { font-family:'Space Mono',monospace; font-size:40px; font-weight:700; color:var(--accent); line-height:1; text-shadow:0 0 20px var(--accent); }
  .info-panel .name { font-size:18px; font-weight:600; color:var(--text); margin-top:4px; }
  .info-panel .detail { font-size:12px; color:var(--muted); margin-top:2px; font-family:'Space Mono',monospace; }
  .controls { display:flex; flex-direction:column; gap:8px; align-items:stretch; min-width:200px; }
  .voice-info { font-size:11px; color:var(--muted); font-family:'Space Mono',monospace; text-align:center; }
  #voiceSelect { background:var(--surface); color:var(--text); border:1px solid var(--border); border-radius:6px; padding:6px 10px; font-size:11px; font-family:'Space Mono',monospace; cursor:pointer; width:100%; }
  #testBtn { background:var(--accent); color:#000; border:none; border-radius:6px; padding:9px 16px; font-family:'Space Mono',monospace; font-size:12px; font-weight:700; cursor:pointer; letter-spacing:.05em; }
  #testBtn:hover { opacity:.85; }
  .table-wrap { overflow-x:auto; padding-bottom:8px; }
  .periodic-table { display:grid; grid-template-columns:repeat(18,52px); grid-template-rows:repeat(10,52px); gap:3px; }
  .element { position:relative; border-radius:4px; border:1px solid rgba(255,255,255,.06); cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2px; transition:all .15s ease; overflow:hidden; }
  .element::before { content:''; position:absolute; inset:0; opacity:0; transition:opacity .15s ease; background:white; border-radius:3px; }
  .element:hover::before { opacity:.1; }
  .element:hover { transform:scale(1.12); z-index:10; box-shadow:0 0 16px rgba(255,255,255,.15); }
  .element .num { font-family:'Space Mono',monospace; font-size:8px; color:rgba(255,255,255,.5); line-height:1; align-self:flex-start; padding-left:2px; }
  .element .sym { font-family:'Space Mono',monospace; font-size:16px; font-weight:700; color:#fff; line-height:1; }
  .element .nom { font-size:7px; color:rgba(255,255,255,.65); line-height:1; text-align:center; max-width:100%; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; padding:0 2px; }
  .hydrogen    { background:linear-gradient(135deg,#164e63,#0e7490); }
  .alkali      { background:linear-gradient(135deg,#7f1d1d,#b91c1c); }
  .alkaline    { background:linear-gradient(135deg,#78350f,#b45309); }
  .transition  { background:linear-gradient(135deg,#1e1b4b,#3730a3); }
  .posttransition { background:linear-gradient(135deg,#4a1d96,#6d28d9); }
  .metalloid   { background:linear-gradient(135deg,#134e4a,#0f766e); }
  .nonmetal    { background:linear-gradient(135deg,#064e3b,#059669); }
  .halogen     { background:linear-gradient(135deg,#713f12,#a16207); }
  .noble       { background:linear-gradient(135deg,#3b0764,#7e22ce); }
  .lanthanide  { background:linear-gradient(135deg,#831843,#be185d); }
  .actinide    { background:linear-gradient(135deg,#7c2d12,#c2410c); }
  .element.speaking { animation:pulse-speak .5s ease infinite alternate; z-index:20; }
  @keyframes pulse-speak { from{box-shadow:0 0 8px var(--accent);transform:scale(1.1)} to{box-shadow:0 0 24px var(--accent),0 0 48px rgba(0,212,255,.4);transform:scale(1.18)} }
  .legend { display:flex; flex-wrap:wrap; gap:8px; margin-top:20px; padding-top:16px; border-top:1px solid var(--border); }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
  .legend-dot { width:12px; height:12px; border-radius:2px; flex-shrink:0; }
  .speaking-banner { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--accent); color:#000; font-family:'Space Mono',monospace; font-size:13px; font-weight:700; padding:10px 20px; border-radius:40px; letter-spacing:.05em; opacity:0; transition:opacity .3s ease; pointer-events:none; z-index:100; white-space:nowrap; }
  .speaking-banner.visible { opacity:1; }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div>
      <h1>Tabla Periódica</h1>
      <div class="subtitle">Haz clic en un elemento para escucharlo</div>
    </div>
    <div class="controls">
      <div class="voice-info" id="voiceInfo">⏳ Cargando voces...</div>
      <select id="voiceSelect"><option>-- seleccionar voz --</option></select>
      <button id="testBtn" onclick="testVoice()">▶ PROBAR VOZ</button>
    </div>
    <div class="info-panel">
      <div class="symbol" id="infoSymbol">?</div>
      <div class="name" id="infoName">Selecciona un elemento</div>
      <div class="detail" id="infoDetail">Z = —  |  masa = —</div>
    </div>
  </header>
  <div class="table-wrap">
    <div class="periodic-table" id="table"></div>
  </div>
  <div class="legend" id="legend"></div>
</div>
<div class="speaking-banner" id="banner">🔊 Hablando...</div>

let allVoices = [];
let selectedVoice = null;

function populateVoiceList() {
  allVoices = window.speechSynthesis.getVoices();
  if (!allVoices.length) return;
  const sel = document.getElementById('voiceSelect');
  sel.innerHTML = '';
  const sorted = [...allVoices].sort((a,b) => {
    const ae = a.lang.toLowerCase().startsWith('es') ? 0 : 1;
    const be = b.lang.toLowerCase().startsWith('es') ? 0 : 1;
    return ae - be;
  });
  sorted.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${v.name} (${v.lang})`;
    if (v.lang.toLowerCase().startsWith('es') && !selectedVoice) {
      selectedVoice = v;
      opt.selected = true;
    }
    sel.appendChild(opt);
  });
  if (!selectedVoice && sorted.length) {
    selectedVoice = sorted[0];
    sel.options[0].selected = true;
  }
  const info = document.getElementById('voiceInfo');
  if (selectedVoice) {
    info.textContent = `✅ ${selectedVoice.name}`;
    info.style.color = '#06d6a0';
  } else {
    info.textContent = '⚠️ Sin voz disponible';
    info.style.color = '#f87171';
  }
}

function changeVoice() {
  const sel = document.getElementById('voiceSelect');
  const idx = parseInt(sel.value);
  const sorted = [...allVoices].sort((a,b) => {
    const ae = a.lang.toLowerCase().startsWith('es') ? 0 : 1;
    const be = b.lang.toLowerCase().startsWith('es') ? 0 : 1;
    return ae - be;
  });
  selectedVoice = sorted[idx] || allVoices[0];
  document.getElementById('voiceInfo').textContent = `✅ ${selectedVoice.name}`;
}

function testVoice() {
  speakText("Probando voz. Hidrógeno, Oxígeno, Oro.");
}

function speakText(text) {
  if (!window.speechSynthesis) { alert('Tu navegador no tiene síntesis de voz.'); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  if (selectedVoice) utt.voice = selectedVoice;
  utt.lang = selectedVoice ? selectedVoice.lang : 'es-ES';
  utt.rate = 0.88; utt.pitch = 1; utt.volume = 1;
  const banner = document.getElementById('banner');
  banner.textContent = '🔊 ' + text;
  banner.classList.add('visible');
  utt.onend = () => banner.classList.remove('visible');
  utt.onerror = (e) => { banner.classList.remove('visible'); console.warn('TTS error', e); };
  setTimeout(() => window.speechSynthesis.speak(utt), 80);
}

populateVoiceList();
if (window.speechSynthesis.onvoiceschanged !== undefined) {
  window.speechSynthesis.onvoiceschanged = populateVoiceList;
}

const table = document.getElementById('table');
let currentSpeaking = null;

elementsData.forEach(([z, sym, name, mass, cat, col, row]) => {
  const el = document.createElement('div');
  el.className = `element ${cat}`;
  el.style.gridColumn = col;
  el.style.gridRow = row;
  el.innerHTML = `<span class="num">${z}</span><span class="sym">${sym}</span><span class="nom">${name}</span>`;
  el.addEventListener('click', () => {
    if (currentSpeaking) currentSpeaking.classList.remove('speaking');
    currentSpeaking = el;
    el.classList.add('speaking');
    document.getElementById('infoSymbol').textContent = sym;
    document.getElementById('infoName').textContent = name;
    document.getElementById('infoDetail').textContent = `Z = ${z}  |  masa = ${mass}`;
    const texto = `El elemento ${name} tiene número atómico ${z} y una masa atómica de ${mass}`;
const utt = new SpeechSynthesisUtterance(texto);
    if (selectedVoice) utt.voice = selectedVoice;
    utt.lang = selectedVoice ? selectedVoice.lang : 'es-ES';
    utt.rate = 0.88; utt.pitch = 1; utt.volume = 1;
    const banner = document.getElementById('banner');
    banner.textContent = `🔊 ${name}`;
    banner.classList.add('visible');
    utt.onend = () => { el.classList.remove('speaking'); currentSpeaking=null; banner.classList.remove('visible'); };
    utt.onerror = () => { el.classList.remove('speaking'); currentSpeaking=null; banner.classList.remove('visible'); };
    window.speechSynthesis.cancel();
    setTimeout(() => window.speechSynthesis.speak(utt), 80);
  });
  table.appendChild(el);
});

['6','7'].forEach((row, i) => {
  const m = document.createElement('div');
  m.style.cssText = `grid-column:3;grid-row:${row};display:flex;align-items:center;justify-content:center;font-size:13px;font-family:'Space Mono',monospace;opacity:.6;`;
  m.style.color = i === 0 ? '#be185d' : '#c2410c';
  m.textContent = i === 0 ? '57-71' : '89-103';
  table.appendChild(m);
});

const cats = {
  hydrogen:'Hidrógeno', alkali:'Metal alcalino', alkaline:'Metal alcalinotérreo',
  transition:'Metal de transición', posttransition:'Metal post-transición',
  metalloid:'Metaloide', nonmetal:'No metal', halogen:'Halógeno',
  noble:'Gas noble', lanthanide:'Lantánido', actinide:'Actínido'
};
const colors = {
  hydrogen:'#0e7490', alkali:'#b91c1c', alkaline:'#b45309', transition:'#3730a3',
  posttransition:'#6d28d9', metalloid:'#0f766e', nonmetal:'#059669',
  halogen:'#a16207', noble:'#7e22ce', lanthanide:'#be185d', actinide:'#c2410c'
};
const legend = document.getElementById('legend');
Object.entries(cats).forEach(([k,v]) => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<div class="legend-dot" style="background:${colors[k]}"></div>${v}`;
  legend.appendChild(item);
});
